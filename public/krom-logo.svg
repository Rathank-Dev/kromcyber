<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <style>
      @media (prefers-color-scheme: light) {
        .logo-text { fill: url(#textGradient); }
        .logo-accent { stroke: #06b6d4; }
      }
      @media (prefers-color-scheme: dark) {
        .logo-text { fill: url(#textGradient); }
        .logo-accent { stroke: #06b6d4; }
      }
    </style>
  </defs>
  
  <!-- Main text: KROM -->
  <text x="20" y="80" font-family="Arial, sans-serif" font-size="64" font-weight="800" class="logo-text" letter-spacing="4">KROM</text>
  
  <!-- Divider line -->
  <line x1="235" y1="15" x2="235" y2="105" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
  
  <!-- Main text: CYBER -->
  <text x="260" y="80" font-family="Arial, sans-serif" font-size="64" font-weight="800" class="logo-text" letter-spacing="4">CYBER</text>
  
  <!-- Accent line under KROM -->
  <line x1="20" y1="95" x2="225" y2="95" stroke="#06b6d4" stroke-width="2.5" opacity="0.8"/>
  <circle cx="230" cy="95" r="2.5" fill="#06b6d4"/>
  
  <!-- Binary accent -->
  <text x="20" y="115" font-family="monospace" font-size="10" fill="#06b6d4" opacity="0.5">010101</text>
  <text x="360" y="115" font-family="monospace" font-size="10" fill="#06b6d4" opacity="0.5">101010</text>
</svg>