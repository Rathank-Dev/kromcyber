<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .km-bg { fill: #f8fafc; }
        .km-text { fill: #0891b2; }
        .km-accent { fill: #06b6d4; }
      }
      @media (prefers-color-scheme: dark) {
        .km-bg { fill: #0f172a; }
        .km-text { fill: #06b6d4; }
        .km-accent { fill: #0891b2; }
      }
    </style>
    <linearGradient id="kmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" class="km-bg" rx="40"/>
  
  <!-- Decorative circuit elements -->
  <circle cx="230" cy="26" r="8" class="km-accent" opacity="0.6"/>
  <line x1="230" y1="34" x2="230" y2="50" stroke="url(#kmGradient)" stroke-width="2" opacity="0.4"/>
  <circle cx="26" cy="230" r="8" class="km-accent" opacity="0.6"/>
  <line x1="26" y1="220" x2="26" y2="204" stroke="url(#kmGradient)" stroke-width="2" opacity="0.4"/>
  
  <!-- Main "K" symbol -->
  <g>
    <line x1="55" y1="70" x2="55" y2="186" stroke="url(#kmGradient)" stroke-width="14" stroke-linecap="round"/>
    <line x1="55" y1="128" x2="95" y2="70" stroke="url(#kmGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="128" x2="95" y2="186" stroke="url(#kmGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Divider -->
  <line x1="130" y1="65" x2="130" y2="191" stroke="url(#kmGradient)" stroke-width="3" opacity="0.5"/>
  
  <!-- Main "C" symbol -->
  <g>
    <path d="M 200 75 Q 165 75 165 128 Q 165 181 200 181" 
          fill="none" stroke="url(#kmGradient)" stroke-width="14" stroke-linecap="round"/>
  </g>
  
  <!-- Accent dots (tech theme) -->
  <circle cx="145" cy="100" r="3.5" class="km-accent" opacity="0.8"/>
  <circle cx="145" cy="156" r="3.5" class="km-accent" opacity="0.8"/>
  <circle cx="115" cy="128" r="2.5" class="km-accent" opacity="0.6"/>
  
  <!-- Bottom accent line -->
  <line x1="50" y1="200" x2="160" y2="200" stroke="url(#kmGradient)" stroke-width="2.5" opacity="0.7"/>
  <circle cx="165" cy="200" r="3.5" class="km-accent"/>
  
  <!-- Binary digits accent (very subtle) -->
  <text x="128" y="238" text-anchor="middle" font-family="monospace" font-size="10" class="km-accent" opacity="0.25">01</text>
</svg>